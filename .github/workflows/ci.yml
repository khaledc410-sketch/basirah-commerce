name: verify

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_MODE: demo
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      # Moderate GHSA-qx2v-qp2m-jg93 is time-bounded in docs/SECURITY.md until
      # a patched stable Next.js release ships; high/critical findings fail CI.
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run db:check
      - run: npm run build
